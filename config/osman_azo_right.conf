# FIXED ISSUE #9: Enhanced power management configuration with better I2C handling
# Touchpad (Azoteq IQS5XX) Configuration
CONFIG_SENSOR=y
CONFIG_IQS5XX=y
CONFIG_IQS5XX_INTERRUPT=y
CONFIG_ZMK_POINTING=y
CONFIG_I2C=y
CONFIG_INPUT=y
CONFIG_ZMK_INPUT_LISTENER=y
CONFIG_ZMK_MOUSE=y

# FIXED ISSUE #9: Enhanced I2C configuration for better reliability
CONFIG_I2C_NRFX=y
CONFIG_I2C_INIT_PRIORITY=60
CONFIG_I2C_NRFX_TWI=y

# FIXED ISSUE #9: Power management with I2C wake-up support
CONFIG_PM_DEVICE=y
CONFIG_ZMK_SLEEP=y
# Add delay before sleep to ensure I2C transactions complete
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
# Keep I2C active during light sleep to prevent connection loss
CONFIG_PM_DEVICE_RUNTIME=y

# FIXED ISSUE #2: Enhanced work queue configuration for better interrupt handling
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_PRIORITY=10

# FIXED ISSUE #2: GPIO interrupt handling improvements
CONFIG_GPIO=y
CONFIG_GPIO_NRFX=y

# FIXED ISSUE #6: Thread safety and synchronization
CONFIG_MULTITHREADING=y
CONFIG_NUM_PREEMPT_PRIORITIES=15
CONFIG_NUM_COOP_PRIORITIES=16

# FIXED ISSUE #10: Memory protection and debugging
CONFIG_STACK_CANARIES=y
CONFIG_DEBUG_THREAD_INFO=y
CONFIG_THREAD_STACK_INFO=y

# FIXED ISSUE #8: Bluetooth stability during I2C operations
CONFIG_BT_L2CAP_TX_MTU=65
CONFIG_BT_BUF_ACL_RX_SIZE=69
CONFIG_BT_BUF_ACL_TX_SIZE=69
CONFIG_BT_CONN_TX_MAX=3

# FIXED ISSUE #9: Prevent I2C issues during power transitions
CONFIG_PM_DEVICE_POWER_DOMAIN=y
CONFIG_PM_DEVICE_SHELL=n
